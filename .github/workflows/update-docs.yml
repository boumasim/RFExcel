name: Update Libdoc

on:
  push:
    branches: ["master"]

jobs:
  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -e .

      - name: Generate Libdoc
        run: python -m robot.libdoc rfexcel.RFExcelLibrary docs/RFExcel.html

      - name: Create Pull Request for updated docs
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PAT_FOR_DOCS_PR }} 
          commit-message: "docs(bot): regenerate RFExcel.html [skip ci]"
          title: "docs(bot): regenerate RFExcel.html"
          body: "Automated PR to update Libdoc after changes to master."
          branch: "bot/update-docs"
          add-paths: docs/RFExcel.html
